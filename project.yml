name: AuraHealth
options:
  bundleIdPrefix: com.santiagoalonso
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  groupSortPosition: top

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "QAMM2A6WRQ"

schemes:
  AuraHealth:
    build:
      targets:
        AuraHealth: all

targets:
  AuraHealth:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - AuraHealth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.santiagoalonso.aurahealth
        ICLOUD_CONTAINER_ENVIRONMENT: Development
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: AuraHealth/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "Aura"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.healthcare-fitness"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Aura Health reads your health data to show trends and insights."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Aura Health needs write access for future features."
        CODE_SIGN_ENTITLEMENTS: AuraHealth/AuraHealth.entitlements
      iOS:
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
    resources:
      - AuraHealth/Resources
    attributes:
      SystemCapabilities:
        com.apple.iCloud:
          enabled: 1
    entitlements:
      path: AuraHealth/AuraHealth.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.santiagoalonso.aurahealth
        com.apple.developer.icloud-services:
          - CloudDocuments
          - CloudKit
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
